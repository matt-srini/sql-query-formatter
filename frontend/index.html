<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Formatter — Format SQL Queries Online | sql-formatter.dev</title>
    <meta name="description" content="Format SQL queries instantly with this free online SQL formatter. Supports indentation control, keyword case options, syntax highlighting, copy and download features. Perfect for developers and data engineers.">
    <meta name="keywords" content="sql formatter, format sql online, sql beautifier, sql query formatter, sql formatting tool, sql beautify">
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-Wim_nud2WmqiRN0TLUPSb.js"></script>
    <script>
        window.plausible = window.plausible || function () { (plausible.q = plausible.q || []).push(arguments) }, plausible.init = plausible.init || function (i) { plausible.o = i || {} };
        plausible.init()
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
        id="hljs-dark-theme" disabled>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css"
        id="hljs-light-theme">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="page">
        <section class="card">
            <header class="header">
                <div>
                    <h1>SQL Query Formatter</h1>
                    <p class="subtitle">Lightweight formatting tool for fast SQL cleanup.</p>
                </div>
                <button id="theme-toggle" class="btn btn-secondary" type="button" aria-label="Toggle dark mode">Dark
                    Mode</button>
            </header>

            <div class="formatter-toolbar">
                <div class="toolbar-controls" aria-label="SQL formatting controls">
                    <div class="control">
                        <label for="indent-size">Indent</label>
                        <select id="indent-size" aria-label="Select SQL indent size">
                            <option value="2">2 spaces</option>
                            <option value="4" selected>4 spaces</option>
                        </select>
                    </div>

                    <div class="control">
                        <label for="keyword-case">Keywords</label>
                        <select id="keyword-case" aria-label="Select SQL keyword case">
                            <option value="upper" selected>UPPERCASE</option>
                            <option value="lower">lowercase</option>
                            <option value="preserve">Preserve</option>
                        </select>
                    </div>

                    <div class="control">
                        <label for="sql-dialect">Dialect</label>
                        <select id="sql-dialect" aria-label="Select SQL dialect">
                            <option value="generic" selected>Generic SQL</option>
                            <option value="postgres">PostgreSQL</option>
                            <option value="mysql">MySQL</option>
                            <option value="spark">Spark SQL</option>
                        </select>
                    </div>
                </div>

                <div class="toolbar-actions">
                    <button id="format-btn" class="btn btn-primary" type="button">Format</button>
                    <button id="clear-btn" class="btn btn-secondary" type="button">Clear</button>
                    <button id="sample-btn" class="btn btn-secondary" type="button">Sample SQL</button>
                </div>
            </div>

            <label for="input-sql" class="label">Input SQL</label>
            <textarea id="input-sql" class="sql-input"
                placeholder="Paste SQL here and press Cmd+Enter / Ctrl+Enter"></textarea>

            <p id="status" class="status" aria-live="polite"></p>

            <div class="output-header">
                <h3 class="label">Formatted Output</h3>
                <div class="output-header-actions">
                    <button id="download-sql-btn" class="btn btn-secondary" type="button" disabled>Download .sql</button>
                    <button id="copy-btn" class="btn btn-secondary" type="button" disabled>Copy</button>
                </div>
            </div>
            <section class="output-shell" aria-label="Formatted SQL Output">
                <p id="output-empty" class="output-empty">Formatted SQL will appear here.</p>
                <pre id="output-pre" class="output-pre" hidden><code id="formatted-sql" class="language-sql"></code></pre>
            </section>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
